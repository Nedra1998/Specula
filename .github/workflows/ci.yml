
name: CI


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
      fail-fast: false
      
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Specula
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Configure
        run: |
          mkdir build && cd build
          cmake ..
        
      - name: Build
        run: cmake --build build --parallel --config Debug
        
      - name: Test (Ubuntu)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: ctest --output-on-failure
        working-directory: build

      - name: Test (MacOS/Windows)
        if: ${{ matrix.os == 'macos-latest' || matrix.os == 'windows-latest' }}
        run: ./test/unit-tests
        working-directory: build
